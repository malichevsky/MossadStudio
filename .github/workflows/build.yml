name: Build and Release Mossad Studio

on:
  push:
    tags:
      - 'v*' # Triggers workflow when a tag like v1.0.0 is pushed

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Compile Standalone Executable
        run: |
          cd MossadStudio
          dotnet publish -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: MossadStudio/bin/Release/net10.0-windows/win-x64/publish/MossadStudio.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
