name: Build and Release Mossad Studio

on:
  push:
    tags:
      - 'v*' # Triggers workflow when a tag like v1.0.0 is pushed

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Compile Standalone Executable
        run: |
          dotnet publish -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true

      # Architecture: "Truly Single File"
      #   MossadStudio.exe is now a self-sustaining binary. 
      #   - Monaco editor is bundled as an Embedded Resource.
      #   - On first launch, the app auto-extracts Monaco to bin/Monaco/.
      #   - The Bootstrapper handles SirHurt DLL downloads as needed.
      #
      # This allows the auto-updater to safely swap just the EXE.
      - name: Package Release Archive
        shell: pwsh
        run: |
          $publish = "bin/Release/net10.0-windows/win-x64/publish"
          $zip     = "MossadStudio-${{ github.ref_name }}.zip"

          # Stage the single EXE into the zip
          $stage = "stage/MossadStudio"
          New-Item -ItemType Directory -Force $stage | Out-Null
          Copy-Item "$publish/MossadStudio.exe" "$stage/"
          
          # We also include the LICENSE file in the release package
          if (Test-Path "LICENSE") {
            Copy-Item "LICENSE" "$stage/"
          }

          Compress-Archive -Path "stage/MossadStudio" -DestinationPath $zip

          echo "RELEASE_ZIP=$zip" >> $env:GITHUB_ENV

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.RELEASE_ZIP }}
            bin/Release/net10.0-windows/win-x64/publish/MossadStudio.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
